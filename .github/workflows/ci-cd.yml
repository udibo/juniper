name: CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  format-and-lint:
    name: Check formatting and lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x
          cache: true
      - name: Check formatting
        run: deno fmt --check
      - name: Lint source files
        run: deno lint
  test:
    name: Test on ${{ matrix.os }}
    needs: [format-and-lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Deno (Ubuntu/macOS)
        if: matrix.os != 'windows-latest'
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x
          cache: true
      - name: Setup Deno (Windows - no cache)
        if: matrix.os == 'windows-latest'
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x
          cache: false
      - name: Install dependencies
        run: deno ci
      - name: Run Juniper tests with coverage (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: deno task test --coverage
      - name: Run Juniper tests (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        run: deno task test --parallel
      - name: View coverage report (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        working-directory: src
        run: deno coverage --detailed
      - name: Upload coverage (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          fail_ci_if_error: true
          files: src/coverage/lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Run example tests
        run: deno task test:example --parallel
      - name: Run minimal template tests
        run: deno task test:minimal --parallel
      - name: Run tailwindcss template tests
        run: deno task test:tailwindcss --parallel
      - name: Run tanstack template tests
        run: deno task test:tanstack --parallel
      - name: Run blog tutorial tests
        run: deno task test:blog --parallel
  test-postgres-template:
    name: Test postgres template
    needs: [format-and-lint]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x
          cache: true
      - name: Install dependencies
        run: deno ci
      - name: Apply migrations to the test database
        run: deno task --cwd=templates/postgres db:migrate:test
      - name: Run postgres template tests
        run: deno task test:postgres --parallel
  release:
    name: Release
    needs: [test, test-postgres-template]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x
          # No shared dependency cache on the publish job: it is the only job
          # with id-token: write, so it must not restore a cache another job
          # could have populated.
          cache: false
      - name: Install dependencies
        run: deno ci
      - name: Copy README, LICENSE, and docs to src
        run: |
          cp README.md src/
          cp LICENSE src/
          cp CONTRIBUTING.md src/
          cp -r docs src/
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Run through Deno, not npx: semantic-release and its plugins resolve
        # from deno.lock under minimumDependencyAge with npm lifecycle scripts
        # disabled, so the only code executing while id-token: write is active is
        # pinned and integrity-checked. Versions are pinned in deno.json:
        # semantic-release is held at ^24 because v25's engines (>=24.10) reject
        # Deno's emulated Node; @sebbo2002/semantic-release-jsr is held at 3.2.1
        # because 4.0.0 ships a CJS bundle semantic-release rejects as
        # EPLUGINSCONF (https://github.com/sebbo2002/semantic-release-jsr/issues/153).
        run: deno run -A npm:semantic-release
